kind = "web"
previewPath = "/"
title = "HandSphere AI"
version = "1.0.0"
id = "artifacts/handsphere"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25724

[services.development]
run = "pnpm --filter @workspace/handsphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/handsphere", "run", "build" ]
serve = "static"
publicDir = "artifacts/handsphere/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25724"
BASE_PATH = "/"
